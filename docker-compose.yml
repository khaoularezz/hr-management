version: '3.8'

services:

  # Serveur Web
  nginx:
    image: nginx:alpine
    container_name: hr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - hr_network

  # PHP Laravel
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hr_php
    restart: unless-stopped
    volumes:
      - ./:/var/www
    networks:
      - hr_network

  # Base de données
  mysql:
    image: mysql:8.0
    container_name: hr_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hr_management
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: hr_user
    volumes:
      - hr_mysql_data:/var/lib/mysql
    networks:
      - hr_network

  # Interface base de données
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hr_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - hr_network

  # Serveur email de test
  mailpit:
    image: axllent/mailpit
    container_name: hr_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - hr_network

networks:
  hr_network:
    driver: bridge

volumes:
  hr_mysql_data:
    driver: local